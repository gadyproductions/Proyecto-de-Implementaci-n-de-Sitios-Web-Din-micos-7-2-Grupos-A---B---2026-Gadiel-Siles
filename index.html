<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/calendario.css">
    <title>Calendario Dinámico</title>
</head>
<body>

<!-- Encabezado del calendario -->
<h1 class="title">Calendario</h1>
<!-- Contenedor principal del calendario -->
<div class="calendar">
<!-- Información del mes y año -->
<div class="calendar__info">
<!-- Botón para ir al mes anterior -->
<div class="calendar__prev" id="prev-month">&#9664;</div>
<!-- Mostrar el mes actual -->
<div class="calendar__month" id="month">Abril</div>
<!-- Mostrar el año actual -->
<div class="calendar__year" id="year">2023</div>
<!-- Botón para ir al mes siguiente -->
<div class="calendar__next" id="next-month">&#9654;</div>
</div>
<!-- Días de la semana -->
<div class="calendar-week">
<!-- Lunes -->
<div class="calendar__day calendar__item">Lun</div>
<!-- Martes -->
<div class="calendar__day calendar__item">Mar</div>
<!-- Miércoles -->
<div class="calendar__day calendar__item">Mié</div>
<!-- Jueves -->
<div class="calendar__day calendar__item">Jue</div>
<!-- Viernes -->
<div class="calendar__day calendar__item">Vie</div>
<!-- Sábado -->
<div class="calendar__day calendar__item">Sáb</div>
<!-- Domingo -->
<div class="calendar__day calendar__item">Dom</div>
</div>
<div class="calendar__dates" id="dates"></div>
</div>
<script src="./js/calendario.js"></script>
</body>
</html>
